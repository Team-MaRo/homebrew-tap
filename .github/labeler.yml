documentation:
  - changed-files:
    - any-glob-to-any-file: '**/*.md'

formula:
  - changed-files:
    - any-glob-to-any-file: 'Formula/**'

github-actions:
  - changed-files:
    - any-glob-to-any-file: '.github/workflows/**'

feature:
  - head-branch: ['^feature', 'feature']

release:
  - all:
    - base-branch: 'master'
    - head-branch: ['^release', 'release']
