# A Homebrew tap has no language manifest (no npm/cargo/nix/composer) — its only
# updatable dependencies are the GitHub Actions used in .github/workflows/.
# See: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    labels:
      - "dependabot :robot:"
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
      timezone: Europe/Zurich
