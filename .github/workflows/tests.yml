name: brew test-bot

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test-bot:
    name: Test formulae
    strategy:
      matrix:
        os: [ macos-15-intel, macos-26 ]
        include:
          - os: ubuntu-latest
            container: ghcr.io/homebrew/brew:main
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ github.token }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - name: Clean up before tests
        run: brew test-bot --only-cleanup-before

      - name: Set up test-bot
        run: brew test-bot --only-setup

      # Equivalent to `brew test-bot --only-tap-syntax`, but with the version
      # audit skipped. test-bot hardcodes `brew audit --except=installed`, and
      # our binary formulae keep an explicit `version` that Linux flags as
      # "redundant with version scanned from URL" — yet it's required on macOS,
      # where the versionless asset name (…-arm64) makes URL version-scanning
      # wrong. `--except=version` drops only that false-positive check.
      - name: Test tap syntax
        run: |
          TAP="$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]' | sed 's#/homebrew-#/#')"
          brew style "$TAP"
          brew readall --aliases --os=all --arch=all "$TAP"
          brew audit --except=installed,version --tap="$TAP"

      - name: Test formulae
        run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'
